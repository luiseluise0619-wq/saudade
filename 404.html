<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; object-src 'none'; base-uri 'self'" />
<title>saudade — page not found</title>
<style>
:root { --paper: #F4ECD6; --ink: #1A130D; --rust: #7E2818; --bone-d: #3F3A32; --rule: rgba(11,11,15,.18); }
html, body {
    background: var(--paper); color: var(--ink);
    font-family: 'Fraunces', Georgia, serif; font-weight: 300;
    margin: 0; padding: 0; min-height: 100vh;
}
.page {
    max-width: 640px; margin: 0 auto;
    padding: clamp(64px, 12vw, 140px) clamp(24px, 6vw, 48px);
    display: flex; flex-direction: column; gap: clamp(24px, 4vw, 40px);
}
.crumb {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 10px; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--bone-d);
    padding-bottom: clamp(14px, 2vw, 18px);
    border-bottom: 0.5px solid var(--rule);
    margin: 0;
}
.code {
    font-family: 'Fraunces', Georgia, serif; font-weight: 300; font-style: italic;
    font-size: clamp(96px, 22vw, 220px); line-height: 0.9; letter-spacing: -0.04em;
    color: var(--rust); margin: 0;
}
.line {
    font-family: 'Fraunces', Georgia, serif; font-weight: 300;
    font-size: clamp(20px, 2.2vw, 28px); line-height: 1.45;
    color: var(--ink); margin: 0; max-width: 32ch;
}
.line em { color: var(--rust); font-style: italic; }
.note {
    font-family: 'Fraunces', Georgia, serif; font-weight: 300;
    font-size: clamp(15px, 1.6vw, 18px); line-height: 1.55;
    color: var(--bone-d); margin: 0; max-width: 48ch;
}
.back {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--bone-d);
    text-decoration: none; padding-top: clamp(16px, 2vw, 24px);
    border-top: 0.5px solid var(--rule);
}
.back:hover { color: var(--rust); }
.back::before { content: '← '; }
@media print { .crumb, .back { display: none; } }
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=JetBrains+Mono:wght@400;500&display=swap" />
</head>
<body>
<main class="page">
    <p class="crumb">§ 404 · NOT FILED</p>
    <p class="code">404.</p>
    <p class="line">This page is not in the <em>archive</em>.</p>
    <p class="note">It may have been moved, renamed, or never written. The editor does not keep broken pages on purpose, so this is probably an honest mistake — your link, our routing, or a slow service worker. Try the cover.</p>
    <a class="back" href="/">back to the cover</a>
</main>
<script src="404.js"></script>
</body>
</html>
