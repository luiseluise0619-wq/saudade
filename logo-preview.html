<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AURA Logo Preview</title>
<style>
body { margin:0; background:#05060a; color:#fff; font-family:sans-serif; padding:40px; }
.row { display:flex; gap:40px; align-items:center; margin-bottom:40px; flex-wrap:wrap; }
.card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:30px; }
h3 { color:#8d93a4; font-size:11px; letter-spacing:0.2em; margin:0 0 16px; }
.color-swatch { display:flex; gap:20px; margin-top:20px; }
.swatch { width:120px; padding:16px; border-radius:14px; background:rgba(255,255,255,0.04); text-align:center; }
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<defs>
  <symbol id="aura-logo" viewBox="0 0 200 200">
    <path fill="currentColor" d="
      M 100 22
      C 55 22, 22 55, 22 100
      C 22 125, 32 145, 48 158
      L 48 168
      L 22 168
      L 22 178
      L 78 178
      L 78 155
      C 62 145, 48 128, 48 100
      C 48 70, 72 48, 100 48
      C 128 48, 152 70, 152 100
      C 152 128, 138 145, 122 155
      L 122 178
      L 178 178
      L 178 168
      L 152 168
      L 152 158
      C 168 145, 178 125, 178 100
      C 178 55, 145 22, 100 22
      Z
    "/>
    <circle cx="100" cy="95" r="16" fill="currentColor"/>
    <g fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M 62 98 Q 100 76, 138 92" opacity="0.95"/>
      <path d="M 62 98 Q 100 118, 138 92" stroke-width="2.8"/>
      <path d="M 60 96 Q 100 74, 140 91" opacity="0.6" stroke-width="1.2"/>
      <path d="M 60 100 Q 100 122, 140 94" opacity="0.6" stroke-width="1.2"/>
    </g>
    <g fill="currentColor">
      <path d="M 108 60 L 110 66 L 116 68 L 110 70 L 108 76 L 106 70 L 100 68 L 106 66 Z"/>
      <path d="M 125 120 L 126.5 124 L 130.5 125.5 L 126.5 127 L 125 131 L 123.5 127 L 119.5 125.5 L 123.5 124 Z"/>
      <circle cx="78" cy="82" r="1.3"/>
      <circle cx="125" cy="75" r="1.1"/>
      <circle cx="85" cy="115" r="1.2"/>
      <circle cx="118" cy="105" r="1"/>
      <circle cx="72" cy="105" r="0.9"/>
      <circle cx="132" cy="110" r="0.8"/>
    </g>
  </symbol>
</defs>
</svg>

<h1>AURA Logo Preview</h1>

<div class="row">
<div class="card">
<h3>SIZE: 48px (topbar)</h3>
<svg width="48" height="48" style="color:#ff5d50"><use href="#aura-logo"/></svg>
</div>

<div class="card">
<h3>SIZE: 80px</h3>
<svg width="80" height="80" style="color:#ff5d50"><use href="#aura-logo"/></svg>
</div>

<div class="card">
<h3>SIZE: 140px (loading)</h3>
<svg width="140" height="140" style="color:#ff5d50; filter: drop-shadow(0 0 24px rgba(255,93,80,0.5))"><use href="#aura-logo"/></svg>
</div>

<div class="card">
<h3>SIZE: 200px (hero)</h3>
<svg width="200" height="200" style="color:#ff5d50; filter: drop-shadow(0 0 32px rgba(255,93,80,0.5))"><use href="#aura-logo"/></svg>
</div>
</div>

<div class="card">
<h3>THEME COLORS</h3>
<div class="color-swatch">
  <div class="swatch"><svg width="70" height="70" style="color:#ff5d50"><use href="#aura-logo"/></svg><div>Solar Red</div></div>
  <div class="swatch"><svg width="70" height="70" style="color:#77c0ff"><use href="#aura-logo"/></svg><div>Ice Blue</div></div>
  <div class="swatch"><svg width="70" height="70" style="color:#49df82"><use href="#aura-logo"/></svg><div>Forest</div></div>
  <div class="swatch"><svg width="70" height="70" style="color:#ff9e52"><use href="#aura-logo"/></svg><div>Sunset</div></div>
  <div class="swatch"><svg width="70" height="70" style="color:#c487ff"><use href="#aura-logo"/></svg><div>Nebula</div></div>
  <div class="swatch"><svg width="70" height="70" style="color:#f0d465"><use href="#aura-logo"/></svg><div>Gold</div></div>
</div>
</div>

<div class="card" style="margin-top:30px; background:#fff; color:#000">
<h3 style="color:#555">ON LIGHT BG</h3>
<svg width="140" height="140" style="color:#000"><use href="#aura-logo"/></svg>
</div>

</body>
</html>
