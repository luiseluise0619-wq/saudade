<!-- LOUNJ — primary brand mark.
     사용처: 큰 로고 (initial loading screen), README hero, marketing.
     색상: cyan → purple → amber 그라디언트.
     라이센스: 운영자 자체 제작 / © 2026 LEEJAEJIN. -->
<svg id="lounj-svg" width="400" height="400" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lounjGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="50%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g filter="url(#hyperGlow)">
    <!-- Back triangle outline -->
    <path d="M 256,60 L 60,400 L 452,400 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Refractive faces -->
    <path d="M 256,60 L 60,400 L 256,320 Z" fill="url(#lounjGrad)" opacity="0.1"/>
    <path d="M 256,60 L 452,400 L 256,320 Z" fill="white" opacity="0.05"/>

    <!-- Core lens (the 'O' portal) -->
    <circle cx="256" cy="256" r="48" fill="none" stroke="url(#lounjGrad)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="10" fill="#fff"/>

    <!-- Vertical focus ray -->
    <rect x="253" y="60" width="6" height="340" rx="3" fill="url(#lounjGrad)" opacity="0.7"/>

    <!-- Horizon line -->
    <line x1="120" y1="320" x2="392" y2="320" stroke="white" stroke-width="1" opacity="0.3"/>

    <!-- Edge highlights -->
    <path d="M 256,60 L 60,400" stroke="white" stroke-width="2" stroke-dasharray="10 400" opacity="0.6"/>
    <path d="M 256,60 L 452,400" stroke="white" stroke-width="2" stroke-dasharray="10 400" opacity="0.6"/>
  </g>
</svg>
