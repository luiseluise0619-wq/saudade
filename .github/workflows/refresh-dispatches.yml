name: Refresh per-edition dispatches

# Replaces the broken translate cron. Each edition (en/ko/ja/pt/es) gets its
# own Gemini-drafted dispatches in native voice — EN speaks to Seoul/Tokyo/
# Lisbon readers, KO to Seoul/Busan/Jeju, JA to Tokyo/Osaka/Kyoto, PT to
# Lisboa/Porto/Sintra, ES to Madrid/Barcelona/Buenos Aires.
# EN was previously the Worker D1 cron, but that pipeline stalled (froze at
# 2026-05-05); EN now refreshes through this reliable path like the others.
#
# Setup:
#   Settings → Secrets → New repository secret
#     GEMINI_KEY   (https://aistudio.google.com/apikey)
#
# Manual run:
#   Actions → "Refresh per-edition dispatches" → Run workflow
#   pick editions or leave blank for all four.
#
# Schedule (default):
#   21:00 UTC daily = 06:00 KST next morning (matches existing dispatch
#   filing time). Disabled by default until secret is set + first run is
#   verified — uncomment the schedule block to enable.

on:
  workflow_dispatch:
    inputs:
      editions:
        description: "Editions (comma-separated). Leave blank for all four."
        required: false
        default: ""
  # 21:00 UTC daily = 06:00 KST next morning (matches §9.5 daily filing).
  schedule:
    - cron: '0 21 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with: { node-version: "20" }

      - name: Refresh dispatches via Gemini
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "::error::GEMINI_KEY secret not set."
            echo "Add it: Settings → Secrets → New repository secret"
            exit 1
          fi
          ARGS=""
          if [ -n "${{ inputs.editions }}" ]; then
            ARGS="--editions ${{ inputs.editions }}"
          fi
          eval node scripts/refresh-dispatches.js $ARGS

      - name: Validate
        run: node scripts/validate-content.js
        continue-on-error: true

      - name: Bump cache if dispatches changed
        if: always()
        run: |
          # 디스패치 파일이 실제로 바뀌었으면 캐시버스터를 범프(sw.js + index.html).
          # 디스패치는 프론트에서 force-cache 로 읽으므로, 범프 없이는 서비스워커가
          # 옛 매거진 글을 계속 서빙한다 → "글이 안 바뀐다"의 원인. 범프하면 배포 후
          # 사용자에게 새 글이 즉시 반영된다.
          if ! git diff --quiet data/dispatches.json data/dispatches.ko.json data/dispatches.ja.json \
                                data/dispatches.pt.json data/dispatches.es.json 2>/dev/null; then
            node scripts/bump-cache.js
          fi

      - name: Open pull request
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="content/dispatches-${{ github.run_id }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          shopt -s nullglob
          git add data/dispatches.json data/dispatches.ko.json data/dispatches.ja.json \
                  data/dispatches.pt.json data/dispatches.es.json 2>/dev/null || true
          # 캐시 범프 결과(sw.js + index.html)도 함께 커밋 → 머지 한 번으로 새 글이 반영됨.
          git add sw.js index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No dispatch changes to commit — skipping PR."
            exit 0
          fi
          git commit -m "content: refresh per-edition dispatches"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "content: per-edition dispatches refresh" \
            --body "Automated daily refresh via \`.github/workflows/refresh-dispatches.yml\`.

          Each edition (ko/ja/pt/es) is independently authored in native voice for that audience's cities. **Not translations.**

          Editions covered: \`${{ inputs.editions || 'en,ko,ja,pt,es (all)' }}\`

          ### Reviewer checklist
          - [ ] Tone check — declarative voice, magazine cadence, not news
          - [ ] No politics / war / scandals / violence
          - [ ] Each city has 3 items
          - [ ] City names match the edition's audience (KO=서울/부산/제주, JA=東京/大阪/京都, PT=Lisboa/Porto/Sintra, ES=Madrid/Barcelona/BA)
          - [ ] \`node scripts/validate-content.js\` passes (CI)

          Squash-merge."

          # PR 자동 머지 — 매일 무인 갱신을 위해. main 에 직접 push 하지 않고
          # PR 을 거쳐 머지하므로 저장소 규칙(직접 push 금지)을 지킨다.
          # 1) 즉시 squash-merge 시도 → 2) 필수 체크로 막히면 auto-merge 활성화 →
          # 3) 둘 다 실패(예: 설정에서 auto-merge 비활성)하면 경고만 남기고 PR 은 그대로 두어 수동 머지.
          gh pr merge "$BRANCH" --squash --delete-branch \
            || gh pr merge "$BRANCH" --squash --auto --delete-branch \
            || echo "::warning::자동 머지 실패 — Actions 로그 확인 후 PR 을 수동으로 머지하세요."
