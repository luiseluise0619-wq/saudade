name: D1 backup (daily)

# §11 — solo-founder data safety. D1 free tier has no automatic backups.
# A user-entered ledger row lost is gone forever; that is the only class
# of irreversible loss in the system. This workflow dumps the whole D1
# database with `wrangler d1 export` and commits the SQL to a single
# long-lived orphan branch `backups`, under .backups/d1-YYYY-MM-DD.sql.
# Snapshots older than 30 days are pruned from that branch each run.
#
# Restore:
#   git fetch origin backups
#   git show backups:.backups/d1-2026-05-25.sql > restore.sql
#   wrangler d1 execute saudade_db --remote --file restore.sql
#
# Setup once:
#   Settings → Secrets and variables → Actions → New repository secret
#     CLOUDFLARE_API_TOKEN  (Account > API Tokens > template "Edit Cloudflare Workers")
#     CLOUDFLARE_ACCOUNT_ID (Workers dashboard, right sidebar)

on:
  workflow_dispatch:
  # 스케줄 제거 — Cloudflare D1 백업은 CF 시크릿이 필요한데 CF 이전(Vercel) 중이라
  # 매일 실패 스팸만 났다. 수동(workflow_dispatch)으로만. CF 계속 쓰면 secrets 넣고 수동 실행.

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with: { node-version: "20" }

      - name: Install wrangler
        run: npm install -g wrangler@latest

      # Export FIRST, while wrangler.toml is present in the working tree,
      # and write OUTSIDE the repo ($RUNNER_TEMP) so later git operations
      # (branch switch, rm) can't touch the dump.
      - name: Export D1 to SQL
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE 시크릿 미설정 — D1 백업 건너뜀(실패 아님)."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          OUT="$RUNNER_TEMP/d1-$DATE.sql"
          wrangler d1 export saudade_db --remote --output "$OUT"
          if [ ! -s "$OUT" ]; then
            echo "::error::Export produced an empty file — aborting (no false-positive backup)."
            exit 1
          fi
          ls -lh "$OUT"
          echo "BACKUP_DATE=$DATE"            >> "$GITHUB_ENV"
          echo "BACKUP_BYTES=$(stat -c %s "$OUT")" >> "$GITHUB_ENV"
          echo "BACKUP_SRC=$OUT"              >> "$GITHUB_ENV"

      - name: Commit to the backups branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check out the long-lived backups branch (create as orphan on
          # first run). Either path lands us on `backups` with its history.
          if git ls-remote --exit-code --heads origin backups >/dev/null 2>&1; then
            git fetch origin backups
            git checkout backups
          else
            git checkout --orphan backups
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p .backups
            printf '# saudade D1 backups\n\nDaily `wrangler d1 export` snapshots. 30-day retention.\n' > README.md
          fi

          mkdir -p .backups
          cp "$BACKUP_SRC" ".backups/d1-${BACKUP_DATE}.sql"

          # Prune snapshots older than 30 days by filename date.
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          for f in .backups/d1-*.sql; do
            [ -e "$f" ] || continue
            d=$(basename "$f" .sql | sed 's/^d1-//')
            if [ "$d" \< "$CUTOFF" ]; then
              echo "pruning $f"
              git rm -q "$f" || rm -f "$f"
            fi
          done

          git add .backups/ README.md
          if git diff --staged --quiet; then
            echo "Nothing changed (same-day re-run with identical export)."
            exit 0
          fi
          git commit -m "backup: D1 snapshot ${BACKUP_DATE} (${BACKUP_BYTES} bytes)"
          git push -u origin backups
