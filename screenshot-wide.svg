<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F2EEE3"/>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#16151A">
    <text x="640" y="130" text-anchor="middle" font-size="68" font-style="italic">saudade</text>
    <line x1="200" y1="175" x2="1080" y2="175" stroke="#16151A" stroke-width="1"/>
    <text x="640" y="212" text-anchor="middle" font-size="14" letter-spacing="5">DISPATCHES · ATLAS · LISTENING ROOM · LEDGER</text>

    <g>
      <text x="200" y="320" font-size="14" letter-spacing="3">SEOUL — TODAY</text>
      <text x="200" y="365" font-size="32" font-style="italic">The rain returns to Jongno.</text>
      <line x1="200" y1="395" x2="340" y2="395" stroke="#5BA890" stroke-width="1.5"/>
      <text x="200" y="430" font-size="15" opacity="0.7">Three lines. One source. Linked.</text>
    </g>

    <g>
      <text x="720" y="320" font-size="14" letter-spacing="3">LISBON — TODAY</text>
      <text x="720" y="365" font-size="32" font-style="italic">Trams empty before noon.</text>
      <line x1="720" y1="395" x2="860" y2="395" stroke="#5BA890" stroke-width="1.5"/>
      <text x="720" y="430" font-size="15" opacity="0.7">A weather note. A passing tram.</text>
    </g>

    <text x="640" y="600" text-anchor="middle" font-size="14" letter-spacing="4" opacity="0.5">QUIET · BY · DESIGN</text>
  </g>
</svg>
